services:
  - type: web
    name: theris-backend
    env: node
    rootDir: apps/theris-backend
    buildCommand: npm install && npx prisma generate && npx vite build && npx tsc -p tsconfig.json && npx prisma migrate deploy && node prisma/scripts/invalidate-sessions-if-flagged.js
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      # === Banco de dados ===
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # === Auth refactor (Bloco 1-8) ===
      - key: SESSION_PEPPER
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: IP_PEPPER
        sync: false
      - key: SESSION_IDLE_MINUTES
        value: "30"
      - key: SESSION_ABSOLUTE_HOURS
        value: "12"
      - key: FORCE_SESSION_INVALIDATION
        sync: false
      - key: APP_BASE_URL
        value: https://theris.grupo-3c.com
      - key: FRONTEND_URL
        value: https://theris.grupo-3c.com
      # === Google OAuth ===
      - key: GOOGLE_ID_CLIENT
        sync: false
      - key: GOOGLE_WORKSPACE_HOSTED_DOMAIN
        value: grupo-3c.com
      # === Email (MFA) ===
      - key: RESEND_API_KEY
        sync: false
      # === Frontend auth mode ===
      - key: VITE_AUTH_MODE
        sync: false
      - key: VITE_API_URL
        value: https://theris-backend.onrender.com
      # === Slack ===
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # === JumpCloud (OAuth Service Account + fallback) ===
      - key: JUMPCLOUD_CLIENT_ID
        sync: false
      - key: JUMPCLOUD_CLIENT_SECRET
        sync: false
      - key: JUMPCLOUD_ORG_ID
        sync: false
      - key: JUMPCLOUD_API_KEY
        sync: false
      # === Outros ===
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: SGSI_SERVICE_TOKEN
        sync: false

  - type: web
    name: sgsi-backend
    env: node
    rootDir: apps/sgsi-backend
    buildCommand: npm install && npx prisma generate && npx tsc -p tsconfig.json && npx prisma migrate deploy
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: THERIS_API_URL
        value: https://theris-backend.onrender.com
      - key: THERIS_SERVICE_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SGSI_JWT_SECRET
        sync: false
      - key: SGSI_AUDITOR_TOKEN_TTL
        value: "86400"
      - key: CLICKUP_LIST_ID_SGSI
        sync: false
