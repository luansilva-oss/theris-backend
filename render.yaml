services:
  - type: web
    name: theris-backend
    env: node
    rootDir: apps/theris-backend
    buildCommand: npm install && npx prisma generate && npx vite build && npx tsc -p tsconfig.json && npx prisma migrate deploy
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: JUMPCLOUD_API_KEY
        sync: false
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: SGSI_SERVICE_TOKEN
        sync: false

  - type: web
    name: sgsi-backend
    env: node
    rootDir: apps/sgsi-backend
    buildCommand: npm install && npx prisma generate && npx tsc -p tsconfig.json && npx prisma migrate deploy
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: THERIS_API_URL
        value: https://theris-backend.onrender.com
      - key: THERIS_SERVICE_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SGSI_JWT_SECRET
        sync: false
      - key: SGSI_AUDITOR_TOKEN_TTL
        value: "86400"
      - key: CLICKUP_LIST_ID_SGSI
        sync: false
