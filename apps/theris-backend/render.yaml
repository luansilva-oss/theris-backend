services:
  - type: web
    name: theris-backend
    env: node
    # Seed removido do build: rodar seed a cada deploy apagava dados em produção.
# Para ambiente novo: rodar manualmente uma vez: npm run seed:master
buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx vite build && npx tsc
    startCommand: node dist-server/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: SESSION_PEPPER
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: IP_PEPPER
        sync: false
      - key: SESSION_IDLE_MINUTES
        value: "30"
      - key: SESSION_ABSOLUTE_HOURS
        value: "12"
      - key: FORCE_SESSION_INVALIDATION
        value: "false"
      - key: APP_BASE_URL
        value: "https://theris.grupo-3c.com"
      - key: GOOGLE_WORKSPACE_HD
        value: "grupo-3c.com"
      - key: DIRECT_URL
        sync: false
